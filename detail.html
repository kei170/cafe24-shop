<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[골라담기] 한끼통살 통 닭가슴살 18종 - 상품 상세</title>
<style>
    /* ===== 기본 리셋 & 레이아웃 (로컬 테스트용) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        background: #f5f5f5;
        color: #333;
    }

    .page-wrap {
        max-width: 1200px;
        margin: 0 auto;
        background: #fff;
    }

    /* 상단 경로 */
    .path-bar {
        padding: 12px 20px;
        font-size: 12px;
        color: #999;
        border-bottom: 1px solid #eee;
    }
    .path-bar a { color: #999; text-decoration: none; }
    .path-bar a:hover { color: #333; }

    /* 상세 영역 2컬럼 */
    .detail-area {
        display: flex;
        gap: 40px;
        padding: 30px 20px;
    }

    /* 이미지 영역 */
    .img-area {
        flex: 1;
        max-width: 560px;
    }
    .img-area .main-img {
        width: 100%;
        border-radius: 8px;
        background: #fdf5ee;
        aspect-ratio: 1/1;
        object-fit: cover;
    }
    .img-placeholder {
        width: 100%;
        aspect-ratio: 1/1;
        background: linear-gradient(135deg, #fdf5ee 0%, #fce8d5 100%);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }
    .img-placeholder .emoji { font-size: 60px; }
    .img-placeholder .title-text {
        font-size: 24px;
        font-weight: 800;
        color: #ff5a2d;
    }
    .img-placeholder .sub-text {
        font-size: 14px;
        color: #b87a4a;
    }

    /* 상품 정보 영역 */
    .info-area {
        flex: 1;
        max-width: 500px;
    }

    /* 상품명 */
    .product-title {
        font-size: 12px;
        color: #999;
        margin-bottom: 4px;
    }
    .product-name {
        font-size: 18px;
        font-weight: 700;
        color: #222;
        margin-bottom: 12px;
        line-height: 1.4;
    }

    /* 가격 */
    .price-area {
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
    }
    .price-origin {
        font-size: 13px;
        color: #aaa;
        text-decoration: line-through;
        margin-bottom: 4px;
    }
    .price-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
    }
    .price-discount {
        font-size: 22px;
        font-weight: 800;
        color: #ff5a2d;
    }
    .price-sale {
        font-size: 22px;
        font-weight: 800;
        color: #222;
    }
    .price-unit {
        font-size: 13px;
        color: #888;
    }

    /* 상품 정보 테이블 */
    .info-table {
        width: 100%;
        margin-bottom: 20px;
        font-size: 13px;
    }
    .info-table tr { border-bottom: 1px solid #f5f5f5; }
    .info-table th {
        text-align: left;
        padding: 8px 0;
        color: #888;
        font-weight: 400;
        width: 100px;
    }
    .info-table td {
        padding: 8px 0;
        color: #333;
    }

    /* ===================================================================
       [구현] 골라담기 커스텀 옵션 UI
       - 기존 카페24 기본 select 옵션을 카드형 UI로 교체
       - 기존 옵션 테이블은 CSS로 숨기고, 카드 클릭 시 JS로 옵션 동기화
       - 반응형: 모바일 2열 / PC(768px 이상) 4열
       =================================================================== */

    /*
     * [구현 - CSS ①]
     * 기존 카페24 옵션 테이블 숨김 처리
     * - visibility:hidden + height:0 으로 숨김
     * - display:none 사용 시 내부 요소 JS 접근 불가 → 구매 흐름 깨짐
     * - 이 방식은 DOM에 유지되어 카페24 옵션 동기화 및 구매 흐름 정상 동작
     */
    .cafe24-option-mock {
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        position: absolute !important;
    }

    /* [구현 - CSS ②] 골라담기 전체 래퍼 */
    .golladamgi-wrap {
        width: 100%;
        margin: 16px 0 20px;
        font-family: 'Noto Sans KR', Apple SD Gothic Neo, sans-serif;
    }

    /* [구현 - CSS ③] 상단 라벨 ("옵션 선택 (필수)") */
    .golladamgi-label {
        font-size: 13px;
        font-weight: 700;
        color: #222;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .golladamgi-label em {
        font-style: normal;
        font-size: 11px;
        color: #ff5a2d;
        background: #fff3f0;
        border: 1px solid #ffcbbf;
        border-radius: 3px;
        padding: 1px 6px;
        font-weight: 600;
    }

    /*
     * [구현 - CSS ④] 카드 그리드 레이아웃
     * - 기본(모바일): 2열
     * - PC(768px 이상): 4열
     */
    .golladamgi-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
    }

    /*
     * [구현 - CSS ⑤] 개별 옵션 카드
     * - button 태그 사용: 터치 영역 확보 및 접근성 대응
     */
    .golladamgi-card {
        position: relative;
        border: 1.5px solid #ddd;
        border-radius: 10px;
        padding: 14px 12px;
        cursor: pointer;
        background: #fff;
        transition: border-color 0.15s, background 0.15s;
        text-align: left;
        width: 100%;
        box-sizing: border-box;
        outline: none;
    }

    .golladamgi-card:hover {
        border-color: #ff5a2d;
        background: #fffaf9;
    }

    /*
     * [구현 - CSS ⑥] 선택된 카드 상태
     */
    .golladamgi-card.is-selected {
        border-color: #ff5a2d;
        background: #fff8f6;
        box-shadow: 0 0 0 1px #ff5a2d;
    }

    /*
     * [구현 - CSS ⑦] 선택 체크 마크 (✓)
     */
    .golladamgi-card .card-check {
        display: none;
        position: absolute;
        top: 8px;
        right: 8px;
        width: 20px;
        height: 20px;
        background: #ff5a2d;
        border-radius: 50%;
        color: #fff;
        font-size: 11px;
        line-height: 20px;
        text-align: center;
    }

    .golladamgi-card.is-selected .card-check {
        display: block;
    }

    /*
     * [구현 - CSS ⑧] 카드 내 뱃지
     */
    .card-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 3px;
        margin-bottom: 6px;
        letter-spacing: 0.2px;
    }

    .card-badge.best { background: #ff5a2d; color: #fff; }
    .card-badge.max  { background: #222; color: #fff; }

    /* [구현 - CSS ⑨] 카드 내 텍스트 요소들 */
    .card-qty {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: #222;
        margin-bottom: 5px;
    }

    .card-origin {
        display: block;
        font-size: 11px;
        color: #aaa;
        text-decoration: line-through;
        margin-bottom: 3px;
    }

    .card-price-row {
        display: flex;
        align-items: baseline;
        gap: 4px;
        margin-bottom: 3px;
    }

    .card-pct {
        font-size: 13px;
        font-weight: 800;
        color: #ff5a2d;
    }

    .card-price {
        font-size: 13px;
        font-weight: 700;
        color: #222;
    }

    .card-unit {
        display: block;
        font-size: 11px;
        color: #999;
        margin-top: 2px;
    }

    /* [구현 - CSS ⑩] 반응형 - PC 4열 */
    @media (min-width: 768px) {
        .golladamgi-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .golladamgi-card { padding: 16px 14px; }
        .card-qty { font-size: 15px; }
        .card-price { font-size: 14px; }
        .card-pct { font-size: 14px; }
    }

    /* [구현 - CSS ⑪] 반응형 - 극소형 화면 대응 */
    @media (max-width: 360px) {
        .card-qty { font-size: 12px; }
        .card-price { font-size: 11px; }
        .card-pct { font-size: 11px; }
        .golladamgi-card { padding: 10px 8px; }
    }

    /* 선택 결과 & 가격 갱신 표시 */
    .selected-result {
        margin-top: 14px;
        padding: 12px 14px;
        background: #f9f9f9;
        border-radius: 8px;
        font-size: 13px;
        color: #333;
        display: none;
    }
    .selected-result.show { display: block; }
    .selected-result strong { color: #ff5a2d; }

    /* 구매 버튼 영역 */
    .buy-area {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #eee;
    }
    .total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        font-size: 14px;
    }
    .total-row .total-label { color: #888; }
    .total-row .total-price { font-size: 18px; font-weight: 800; color: #222; }

    .buy-buttons {
        display: flex;
        gap: 8px;
    }
    .btn-cart {
        flex: 1;
        padding: 14px;
        background: #fff;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        color: #333;
        cursor: pointer;
    }
    .btn-cart:hover { border-color: #999; }
    .btn-buy {
        flex: 2;
        padding: 14px;
        background: #ff5a2d;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
    }
    .btn-buy:hover { background: #e84e24; }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
        .detail-area {
            flex-direction: column;
            gap: 20px;
            padding: 16px;
        }
        .img-area, .info-area {
            max-width: 100%;
        }
    }
</style>
</head>
<body>

<div class="page-wrap">

    <!-- 경로 -->
    <div class="path-bar">
        <a href="#">홈</a> &gt; <a href="#">식품</a> &gt; <a href="#">닭가슴살</a> &gt; <strong>골라담기</strong>
    </div>

    <div class="detail-area">

        <!-- 이미지 영역 (로컬용 플레이스홀더) -->
        <div class="img-area">
            <div class="img-placeholder">
                <span class="emoji">🍗</span>
                <span class="title-text">골라담기</span>
                <span class="sub-text">원하는 맛을 다양하게</span>
                <span class="sub-text">[골라담기] 한끼통살 통 닭가슴살 18종</span>
            </div>
        </div>

        <!-- 상품 정보 영역 -->
        <div class="info-area">

            <p class="product-title">한끼통살 공식몰</p>
            <h2 class="product-name">[골라담기] 한끼통살 통 닭가슴살 18종<br>
                <span style="font-size:13px;color:#888;font-weight:400;">최저가로 즐기는 통살 닭가슴살 100개 골라담기</span>
            </h2>

            <!-- 가격 (동적 갱신 대상) -->
            <div class="price-area">
                <p class="price-origin" id="priceOrigin">33,000원</p>
                <div class="price-row">
                    <span class="price-discount" id="priceDiscount">25%</span>
                    <span class="price-sale" id="priceSale">24,700원</span>
                    <span class="price-unit" id="priceUnit">(개당 2,470원)</span>
                </div>
            </div>

            <!-- 상품 정보 -->
            <table class="info-table">
                <tr><th>출고정보</th><td>🚚 오늘출발 · 평일 14시 / 주말 9시 이전 결제시 당일출고</td></tr>
                <tr><th>배송비</th><td>3,000원 (4만원 이상 구매 시 무료배송)</td></tr>
            </table>

            <!-- ===================================================================
                 [구현] 골라담기 커스텀 옵션 UI
                 =================================================================== -->
            <div class="golladamgi-wrap">
                <p class="golladamgi-label">옵션 선택 <em>많을수록 저렴</em></p>

                <div class="golladamgi-grid" id="golladamgiGrid">

                    <!-- 옵션 카드 1: 10개입 -->
                    <button type="button" class="golladamgi-card" data-option-value="1"
                            data-price="24700" data-origin="33000" data-pct="25" data-unit="2470" data-qty="10개입"
                            onclick="golladamgiSelect(this)">
                        <span class="card-check">✓</span>
                        <span class="card-qty">10개입</span>
                        <span class="card-origin">33,000원</span>
                        <div class="card-price-row">
                            <span class="card-pct">25%</span>
                            <span class="card-price">24,700원</span>
                        </div>
                        <span class="card-unit">개당 2,470원</span>
                    </button>

                    <!-- 옵션 카드 2: 30개입 (베스트) -->
                    <button type="button" class="golladamgi-card" data-option-value="2"
                            data-price="70500" data-origin="99000" data-pct="29" data-unit="2350" data-qty="30개입"
                            onclick="golladamgiSelect(this)">
                        <span class="card-check">✓</span>
                        <span class="card-badge best">가장 많이 사요</span>
                        <span class="card-qty">30개입</span>
                        <span class="card-origin">99,000원</span>
                        <div class="card-price-row">
                            <span class="card-pct">29%</span>
                            <span class="card-price">70,500원</span>
                        </div>
                        <span class="card-unit">개당 2,350원</span>
                    </button>

                    <!-- 옵션 카드 3: 50개입 -->
                    <button type="button" class="golladamgi-card" data-option-value="3"
                            data-price="111500" data-origin="165000" data-pct="32" data-unit="2230" data-qty="50개입"
                            onclick="golladamgiSelect(this)">
                        <span class="card-check">✓</span>
                        <span class="card-qty">50개입</span>
                        <span class="card-origin">165,000원</span>
                        <div class="card-price-row">
                            <span class="card-pct">32%</span>
                            <span class="card-price">111,500원</span>
                        </div>
                        <span class="card-unit">개당 2,230원</span>
                    </button>

                    <!-- 옵션 카드 4: 100개입 (최대할인) -->
                    <button type="button" class="golladamgi-card" data-option-value="4"
                            data-price="196000" data-origin="330000" data-pct="41" data-unit="1960" data-qty="100개입"
                            onclick="golladamgiSelect(this)">
                        <span class="card-check">✓</span>
                        <span class="card-badge max">최대할인</span>
                        <span class="card-qty">100개입</span>
                        <span class="card-origin">330,000원</span>
                        <div class="card-price-row">
                            <span class="card-pct">41%</span>
                            <span class="card-price">196,000원</span>
                        </div>
                        <span class="card-unit">개당 1,960원</span>
                    </button>

                </div>

                <!-- 선택 결과 -->
                <div class="selected-result" id="selectedResult">
                    선택: <strong id="selectedText"></strong>
                </div>
            </div>

            <!-- 카페24 기본 옵션 (숨김 - 로컬에서는 mock select로 동기화 테스트) -->
            <div class="cafe24-option-mock">
                <select id="mockOptionSelect">
                    <option value="">옵션을 선택해주세요</option>
                    <option value="10">10개입 - 24,700원</option>
                    <option value="30">30개입 - 70,500원</option>
                    <option value="50">50개입 - 111,500원</option>
                    <option value="100">100개입 - 196,000원</option>
                </select>
            </div>

            <!-- 구매 버튼 영역 -->
            <div class="buy-area">
                <div class="total-row">
                    <span class="total-label">총 <span id="totalSet">0세트</span></span>
                    <span class="total-price">총 <span id="totalPrice">0</span>원</span>
                </div>
                <div class="buy-buttons">
                    <button class="btn-cart" id="btnCart" onclick="handleCart()">🛒 장바구니</button>
                    <button class="btn-buy" id="btnBuy" onclick="handleBuy()">바로 구매하기</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
/*
 * [구현 - JS] golladamgiSelect(el)
 * 골라담기 카드 클릭 시 실행
 *
 * 1. 카드 선택 상태 UI 갱신
 * 2. 상단 가격 영역 갱신 (가격/할인율/개당가격)
 * 3. 카페24 기본 옵션 동기화 (로컬에서는 mock select)
 * 4. 하단 총 금액 갱신
 */
function golladamgiSelect(el) {
    /* Step 1. 카드 UI 선택 상태 갱신 */
    document.querySelectorAll('.golladamgi-card').forEach(function(c) {
        c.classList.remove('is-selected');
    });
    el.classList.add('is-selected');

    /* Step 2. 상단 가격 영역 갱신 */
    var price  = parseInt(el.getAttribute('data-price'));
    var origin = parseInt(el.getAttribute('data-origin'));
    var pct    = el.getAttribute('data-pct');
    var unit   = el.getAttribute('data-unit');
    var qty    = el.getAttribute('data-qty');

    document.getElementById('priceOrigin').textContent   = origin.toLocaleString() + '원';
    document.getElementById('priceDiscount').textContent  = pct + '%';
    document.getElementById('priceSale').textContent      = price.toLocaleString() + '원';
    document.getElementById('priceUnit').textContent      = '(개당 ' + parseInt(unit).toLocaleString() + '원)';

    /* Step 3. 선택 결과 표시 */
    var result = document.getElementById('selectedResult');
    var text   = document.getElementById('selectedText');
    text.textContent = qty + ' · ' + price.toLocaleString() + '원';
    result.classList.add('show');

    /* Step 4. 카페24 기본 옵션 동기화 (로컬 mock) */
    var optionValue = parseInt(el.getAttribute('data-option-value'));
    var mockSelect  = document.getElementById('mockOptionSelect');
    if (mockSelect) {
        mockSelect.selectedIndex = optionValue;
        mockSelect.dispatchEvent(new Event('change', { bubbles: true }));
    }

    /*
     * [카페24 실제 환경에서는 아래 코드 활성화]
     * if (typeof EC_SDE_setOptionSelect === 'function') {
     *     EC_SDE_setOptionSelect(0, optionValue - 1);
     * }
     */

    /* Step 5. 하단 총 금액 갱신 */
    document.getElementById('totalSet').textContent  = '1세트';
    document.getElementById('totalPrice').textContent = price.toLocaleString();

    console.log('[골라담기] 선택:', qty, '/ 가격:', price.toLocaleString() + '원', '/ mock select index:', optionValue);
}

/* 장바구니 담기 */
function handleCart() {
    var selected = document.querySelector('.golladamgi-card.is-selected');
    if (!selected) {
        alert('옵션을 선택해주세요');
        return;
    }
    var qty   = selected.getAttribute('data-qty');
    var price = parseInt(selected.getAttribute('data-price')).toLocaleString();
    alert('✅ 장바구니에 담겼습니다!\n\n' + qty + ' · ' + price + '원');
}

/* 바로 구매하기 */
function handleBuy() {
    var selected = document.querySelector('.golladamgi-card.is-selected');
    if (!selected) {
        alert('옵션을 선택해주세요');
        return;
    }
    var qty   = selected.getAttribute('data-qty');
    var price = parseInt(selected.getAttribute('data-price')).toLocaleString();
    alert('✅ 구매 페이지로 이동합니다!\n\n' + qty + ' · ' + price + '원');
}
</script>

</body>
</html>
